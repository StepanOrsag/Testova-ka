<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technotron Metal - Hlavička a Hero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">

        <div class="logo">
            <a href="#" class = header-logo>
                <img src="pictures/logo.svg" alt="Technotron Metal">
            </a>
        </div>

        <div class ="main">
            <nav class="nav-main">
                <a href="#">Architektura</a>
                <a href="#">Tahokov</a>
                <a href="#">Služby</a>
                <a href="#">Realizace</a>
                <a href="#">Konfigurátor</a>
            </nav>
        </div>

        <div class="second">
            <nav class="nav-second">
                <a href="#">Katalogy</a>
                <a href="#">Certifikáty</a>
                <a href="#">O nás</a>
                <a href="#">Kontakt</a>
            </nav>
            <button class="search-btn" aria-label="Hledat">🔍</button>
            <div class="language-switch">CZ <span>▼</span></div>
            <a href="#" class="eshop">E-SHOP</a>
        </div>
    </header>

    <section class="hero">

        <div class="hero-content">
            <h1>CHYTRÁ ŘEŠENÍ <br>Z TAHOKOVU.</h1>
            <p>Scrollujte</p>
        </div>

        <div class="hero-slider">
            <div class="slider-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="slider-arrows">
                <button class="arrow left">«</button>
                <button class="arrow right">»</button>
            </div>
        </div>
    </section>
</body>
